name: Commit landing Node 24 type lockfile

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  commit-generated-files:
    if: github.head_ref == 'chore/landing-node24-types'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}
          token: ${{ github.token }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Setup pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.0.9 --activate

      - name: Generate landing lockfile
        working-directory: landing
        run: pnpm add -D @types/node@24.12.4

      - name: Remove temporary workflow
        run: rm .github/workflows/generate-landing-node24-types.yml

      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add landing/package.json landing/pnpm-lock.yaml .github/workflows/generate-landing-node24-types.yml
          git diff --cached --quiet && exit 0
          git commit -m "chore: align landing Node types with Node 24"
          git push
