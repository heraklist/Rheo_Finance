name: Apply Vite 8 esbuild fix

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  apply-vite8-esbuild-fix:
    if: github.head_ref == 'dependabot/npm_and_yarn/vite-8.0.14'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}
          token: ${{ github.token }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Setup pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.0.9 --activate

      - name: Add explicit esbuild dependency
        run: pnpm add -D esbuild@^0.25.12

      - name: Remove temporary files
        run: |
          rm -f vite-build-diagnostics-tail.txt
          rm .github/workflows/apply-vite8-esbuild-fix.yml

      - name: Commit generated fixes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json pnpm-lock.yaml vite-build-diagnostics-tail.txt .github/workflows/apply-vite8-esbuild-fix.yml
          git diff --cached --quiet && exit 0
          git commit -m "fix: add explicit esbuild dependency for Vite 8"
          git push
