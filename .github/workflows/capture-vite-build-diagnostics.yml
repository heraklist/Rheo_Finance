name: Capture Vite build diagnostics

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  capture-vite-build-diagnostics:
    if: github.head_ref == 'dependabot/npm_and_yarn/vite-8.0.14'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}
          token: ${{ github.token }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Setup pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.0.9 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Capture build diagnostics
        run: |
          pnpm build > vite-build-diagnostics.full.txt 2>&1 || true
          tail -260 vite-build-diagnostics.full.txt > vite-build-diagnostics-tail.txt
          rm vite-build-diagnostics.full.txt

      - name: Remove temporary workflow
        run: rm .github/workflows/capture-vite-build-diagnostics.yml

      - name: Commit diagnostics
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add vite-build-diagnostics-tail.txt .github/workflows/capture-vite-build-diagnostics.yml
          git diff --cached --quiet && exit 0
          git commit -m "chore: capture Vite build diagnostics"
          git push
