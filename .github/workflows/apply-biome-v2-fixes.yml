name: Apply Biome v2 fixes

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  apply-biome-fixes:
    if: github.head_ref == 'dependabot/npm_and_yarn/biomejs/biome-2.4.16'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}
          token: ${{ github.token }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Setup pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.0.9 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Apply Biome fixes
        run: pnpm exec biome check . --write

      - name: Remove temporary workflow
        run: rm .github/workflows/apply-biome-v2-fixes.yml

      - name: Commit generated fixes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --cached --quiet && exit 0
          git commit -m "chore: apply Biome v2 fixes"
          git push
