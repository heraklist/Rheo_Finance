name: Regenerate landing lockfile

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  regenerate-landing-lockfile:
    if: github.head_ref == 'security/landing-transitive-overrides'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}
          token: ${{ github.token }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Setup pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.0.9 --activate

      - name: Regenerate landing lockfile
        working-directory: landing
        run: pnpm install --lockfile-only

      - name: Validate landing install and build
        working-directory: landing
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      - name: Remove temporary workflow
        run: rm .github/workflows/regenerate-landing-lockfile.yml

      - name: Commit lockfile updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add landing/pnpm-lock.yaml landing/pnpm-workspace.yaml .github/workflows/regenerate-landing-lockfile.yml
          git diff --cached --quiet && exit 0
          git commit -m "fix(security): regenerate landing lockfile for overrides"
          git push
