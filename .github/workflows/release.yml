name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

env:
  PNPM_VERSION: 11.0.9
  VITE_SUPABASE_URL: https://jdwetppniotobfsueyzq.supabase.co
  VITE_SUPABASE_ANON_KEY: sb_publishable_e2pPJyk82VRW_4136JJMjA_xc6sK7b0
  VITE_LANDING_URL: https://landing-two-dun-95.vercel.app

jobs:
  build-windows:
    runs-on: windows-2022
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Extract version
        id: version
        shell: pwsh
        env:
          RELEASE_REF: ${{ github.ref }}
          RELEASE_REF_NAME: ${{ github.ref_name }}
        run: |
          if ($env:RELEASE_REF -match '^refs/tags/v(?<version>\d+\.\d+\.\d+)$') {
            $version = $Matches.version
          } else {
            $version = (Get-Content src-tauri/tauri.conf.json | ConvertFrom-Json).version
          }
          if ($version -notmatch '^\d+\.\d+\.\d+$') { throw "Invalid release version: $version" }
          "version=$version" >> $env:GITHUB_OUTPUT

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Setup pnpm
        shell: pwsh
        run: |
          corepack enable
          corepack prepare pnpm@${{ env.PNPM_VERSION }} --activate

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate icons
        run: pnpm tauri icon src-tauri/icons/icon.png

      - name: Validate release secrets
        shell: pwsh
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY || secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD || secrets.TAURI_KEY_PASSWORD }}
          VITE_SUPABASE_URL: ${{ env.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ env.VITE_SUPABASE_ANON_KEY }}
        run: |
          if (-not $env:TAURI_SIGNING_PRIVATE_KEY) { throw "Missing TAURI_SIGNING_PRIVATE_KEY or TAURI_PRIVATE_KEY secret" }
          if (-not $env:TAURI_SIGNING_PRIVATE_KEY_PASSWORD) { throw "Missing TAURI_SIGNING_PRIVATE_KEY_PASSWORD or TAURI_KEY_PASSWORD secret" }
          if (-not $env:VITE_SUPABASE_URL) { throw "Missing VITE_SUPABASE_URL" }
          if (-not $env:VITE_SUPABASE_ANON_KEY) { throw "Missing VITE_SUPABASE_ANON_KEY" }
          if (-not $env:VITE_LANDING_URL) { throw "Missing VITE_LANDING_URL" }

      - name: Build signed Windows installer
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY || secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD || secrets.TAURI_KEY_PASSWORD }}
          VITE_SUPABASE_URL: ${{ env.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ env.VITE_SUPABASE_ANON_KEY }}
        run: pnpm tauri build

      - name: Stage Windows artifacts
        shell: pwsh
        run: |
          Remove-Item -Recurse -Force dist -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item "src-tauri/target/release/bundle/nsis/*-setup.exe" dist/
          Copy-Item "src-tauri/target/release/bundle/nsis/*.sig" dist/
          $zip = Get-ChildItem "src-tauri/target/release/bundle/nsis" -Filter "*.nsis.zip" -ErrorAction SilentlyContinue
          if ($zip) { Copy-Item "src-tauri/target/release/bundle/nsis/*.nsis.zip" dist/ }
          Get-ChildItem dist

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v7
        with:
          name: windows-artifacts
          path: dist/*
          retention-days: 7

  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Setup pnpm
        run: |
          corepack enable
          corepack prepare pnpm@${{ env.PNPM_VERSION }} --activate

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Install Android NDK
        run: sdkmanager "ndk;27.0.12077973"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android,i686-linux-android

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate required release secrets
        env:
          VITE_SUPABASE_URL: ${{ env.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ env.VITE_SUPABASE_ANON_KEY }}
        run: |
          test -n "$VITE_SUPABASE_URL" || (echo "Missing VITE_SUPABASE_URL" && exit 1)
          test -n "$VITE_SUPABASE_ANON_KEY" || (echo "Missing VITE_SUPABASE_ANON_KEY" && exit 1)
          test -n "$VITE_LANDING_URL" || (echo "Missing VITE_LANDING_URL" && exit 1)

      - name: Determine Android signing mode
        id: signing
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -n "$ANDROID_KEYSTORE_BASE64" ] && [ -n "$ANDROID_KEYSTORE_PASSWORD" ] && [ -n "$ANDROID_KEY_ALIAS" ] && [ -n "$ANDROID_KEY_PASSWORD" ]; then
            echo "mode=signed" >> "$GITHUB_OUTPUT"
            echo "Building signed Android release APK."
          else
            echo "mode=debug" >> "$GITHUB_OUTPUT"
            echo "Android signing secrets are incomplete; building debug sideload APK instead."
          fi

      - name: Decode Android keystore
        if: steps.signing.outputs.mode == 'signed'
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/rheo-release.jks"
          echo "ANDROID_RELEASE_KEYSTORE=$RUNNER_TEMP/rheo-release.jks" >> "$GITHUB_ENV"

      - name: Init Android project
        run: pnpm tauri android init --ci

      - name: Generate icons
        run: pnpm tauri icon src-tauri/icons/icon.png

      - name: Copy adaptive icon layers
        run: |
          RES="src-tauri/gen/android/app/src/main/res"
          SRC="src-tauri/icons/android"
          mkdir -p "$RES/mipmap-anydpi-v26"
          cat > "$RES/mipmap-anydpi-v26/ic_launcher.xml" <<'XML'
          <?xml version="1.0" encoding="utf-8"?>
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
            <background android:drawable="@mipmap/ic_launcher_background"/>
            <foreground android:drawable="@mipmap/ic_launcher_foreground"/>
          </adaptive-icon>
          XML
          cat > "$RES/mipmap-anydpi-v26/ic_launcher_round.xml" <<'XML'
          <?xml version="1.0" encoding="utf-8"?>
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
            <background android:drawable="@mipmap/ic_launcher_background"/>
            <foreground android:drawable="@mipmap/ic_launcher_foreground"/>
          </adaptive-icon>
          XML
          rm -f "$RES/drawable/ic_launcher_foreground.xml"
          rm -f "$RES/drawable/ic_launcher_background.xml"
          rm -f "$RES/drawable/ic_launcher_monochrome.xml"
          rm -f "$RES/drawable/ic_launcher_monochrome.png"
          cp "$SRC/rheo_android_foreground_1024.png" "$RES/drawable/ic_launcher_foreground.png"
          cp "$SRC/rheo_android_background_1024.png" "$RES/drawable/ic_launcher_background.png"
          for dir in "$RES"/mipmap-*/; do
            [ -d "$dir" ] || continue
            case "$dir" in
              *mipmap-anydpi-v26*)
                rm -f "$dir/ic_launcher.png" "$dir/ic_launcher_round.png"
                rm -f "$dir/ic_launcher_foreground.png" "$dir/ic_launcher_background.png"
                rm -f "$dir/ic_launcher_monochrome.png" "$dir/ic_launcher_monochrome.xml"
                continue
                ;;
            esac
            cp "$SRC/rheo_launcher_1024.png" "$dir/ic_launcher.png" || true
            cp "$SRC/rheo_launcher_1024.png" "$dir/ic_launcher_round.png" || true
            cp "$SRC/rheo_android_foreground_1024.png" "$dir/ic_launcher_foreground.png" || true
            cp "$SRC/rheo_android_background_1024.png" "$dir/ic_launcher_background.png" || true
            rm -f "$dir/ic_launcher_monochrome.png" "$dir/ic_launcher_monochrome.xml"
          done

      - name: Patch Android release signing
        if: steps.signing.outputs.mode == 'signed'
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("src-tauri/gen/android/app/build.gradle.kts")
          text = path.read_text()
          signing = '''android {
              signingConfigs {
                  create("release") {
                      val keystorePath = System.getenv("ANDROID_RELEASE_KEYSTORE")
                      if (keystorePath != null) {
                          storeFile = file(keystorePath)
                          storePassword = System.getenv("ANDROID_RELEASE_STORE_PASSWORD")
                          keyAlias = System.getenv("ANDROID_RELEASE_KEY_ALIAS")
                          keyPassword = System.getenv("ANDROID_RELEASE_KEY_PASSWORD")
                      }
                  }
              }
          '''
          if "signingConfigs" not in text:
              text = text.replace("android {\n", signing, 1)
          if "signingConfig = signingConfigs.getByName(\"release\")" not in text:
              text = text.replace(
                  '        getByName("release") {\n            isMinifyEnabled = true\n',
                  '        getByName("release") {\n            isMinifyEnabled = true\n            signingConfig = signingConfigs.getByName("release")\n',
                  1,
              )
          path.write_text(text)
          PY

      - name: Build signed Android APK
        if: steps.signing.outputs.mode == 'signed'
        env:
          ANDROID_RELEASE_STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.0.12077973
          RUST_MIN_STACK: "8388608"
          VITE_SUPABASE_URL: ${{ env.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ env.VITE_SUPABASE_ANON_KEY }}
        run: pnpm tauri android build --apk --ci

      - name: Build debug Android APK
        if: steps.signing.outputs.mode == 'debug'
        env:
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.0.12077973
          RUST_MIN_STACK: "8388608"
          VITE_SUPABASE_URL: ${{ env.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ env.VITE_SUPABASE_ANON_KEY }}
        run: pnpm tauri android build --debug --apk --ci

      - name: Stage Android artifact
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if [ "$VERSION" = "$GITHUB_REF_NAME" ]; then
            VERSION=$(node -e "console.log(require('./package.json').version)")
          fi
          rm -rf dist
          mkdir -p dist
          APK_PATH=$(find src-tauri/gen/android -name "*.apk" -path "*/release/*" -print -quit)
          if [ -z "$APK_PATH" ]; then
            APK_PATH=$(find src-tauri/gen/android -name "*.apk" -path "*/debug/*" -print -quit)
          fi
          if [ -z "$APK_PATH" ]; then
            APK_PATH=$(find src-tauri/gen/android -name "*.apk" -print -quit)
          fi
          test -n "$APK_PATH" || (echo "Missing Android APK" && exit 1)
          if [ "${{ steps.signing.outputs.mode }}" = "signed" ]; then
            cp "$APK_PATH" "dist/Rheo-Finance-v${VERSION}-android.apk"
          else
            cp "$APK_PATH" "dist/Rheo-Finance-v${VERSION}-android-debug.apk"
          fi
          ls -la dist

      - name: Upload Android artifact
        uses: actions/upload-artifact@v7
        with:
          name: android-artifacts
          path: dist/*
          retention-days: 7

  publish:
    needs: [build-windows, build-android]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Download Windows artifacts
        uses: actions/download-artifact@v7
        with:
          name: windows-artifacts
          path: dist

      - name: Download Android artifact
        uses: actions/download-artifact@v7
        with:
          name: android-artifacts
          path: dist

      - name: Extract release metadata
        id: meta
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if [ "$VERSION" = "$GITHUB_REF_NAME" ]; then
            VERSION="${{ needs.build-windows.outputs.version }}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if [ -f CHANGELOG.md ]; then
            NOTES=$(awk -v ver="v$VERSION" '
              /^## / { if (found) exit; if ($0 ~ ver) found=1; next }
              found { print }
            ' CHANGELOG.md)
          fi
          if [ -z "$NOTES" ]; then NOTES="Rheo Finance v$VERSION"; fi
          echo "notes<<EOF" >> "$GITHUB_OUTPUT"
          echo "$NOTES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Find release artifacts
        id: artifacts
        run: |
          WIN_PACKAGE=$(find dist -name "*.nsis.zip" -print -quit)
          if [ -z "$WIN_PACKAGE" ]; then
            WIN_PACKAGE=$(find dist -name "*-setup.exe" -print -quit)
          fi
          WIN_SIG="$WIN_PACKAGE.sig"
          if [ ! -f "$WIN_SIG" ]; then
            WIN_SIG=$(find dist -name "*.sig" -print -quit)
          fi
          APK=$(find dist -name "*.apk" -print -quit)
          test -n "$WIN_PACKAGE" || (echo "Missing Windows update package" && exit 1)
          test -n "$WIN_SIG" || (echo "Missing Windows signature" && exit 1)
          test -n "$APK" || (echo "Missing Android APK" && exit 1)
          echo "win_package=$WIN_PACKAGE" >> "$GITHUB_OUTPUT"
          echo "win_sig=$WIN_SIG" >> "$GITHUB_OUTPUT"
          echo "apk=$APK" >> "$GITHUB_OUTPUT"

      - name: Generate updater manifests
        run: |
          node scripts/generate-manifests.mjs \
            --version "${{ steps.meta.outputs.version }}" \
            --notes "${{ steps.meta.outputs.notes }}" \
            --windows-package "${{ steps.artifacts.outputs.win_package }}" \
            --windows-signature "${{ steps.artifacts.outputs.win_sig }}" \
            --android-apk "${{ steps.artifacts.outputs.apk }}" \
            --release-url "https://github.com/${{ github.repository }}/releases/download/v${{ steps.meta.outputs.version }}" \
            --output dist

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.meta.outputs.version }}
          name: Rheo Finance v${{ steps.meta.outputs.version }}
          body: ${{ steps.meta.outputs.notes }}
          files: |
            dist/*
          overwrite_files: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
