name: CI

on:
  pull_request:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Setup pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.0.9 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: TypeScript check
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test

      - name: Build
        run: pnpm build

  landing:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Setup pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.0.9 --activate

      - name: Install landing dependencies
        working-directory: landing
        run: pnpm install --frozen-lockfile

      - name: Build landing and Vercel API bundle
        working-directory: landing
        run: pnpm build

  supabase:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Verify Supabase CLI
        run: supabase --version

      - name: Verify Supabase config and migration files
        run: |
          test -f supabase/config.toml
          test -d supabase/migrations
          migration_count=$(find supabase/migrations -type f -name '*.sql' | wc -l | tr -d ' ')
          if [ "$migration_count" -lt 1 ]; then
            echo "No Supabase migration files found."
            exit 1
          fi
          echo "Found $migration_count Supabase migration files."

      - name: Check migration filename uniqueness
        run: |
          duplicate_prefixes=$(find supabase/migrations -type f -name '*.sql' -printf '%f\n' | cut -d '_' -f 1 | sort | uniq -d)
          if [ -n "$duplicate_prefixes" ]; then
            echo "Duplicate migration prefixes found:"
            echo "$duplicate_prefixes"
            exit 1
          fi
          echo "Supabase migration filename uniqueness check passed."

      - name: Document full local database check
        run: |
          echo "Full Supabase Docker validation is intentionally kept as a local/manual check."
          echo "Run locally: pnpm supabase:start && pnpm db:check && pnpm supabase:stop"
