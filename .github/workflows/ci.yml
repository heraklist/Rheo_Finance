name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Setup pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.1.1 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: TypeScript check
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test

      - name: Build
        run: pnpm build

  landing:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Setup pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.1.1 --activate

      - name: Install landing dependencies
        working-directory: landing
        run: pnpm install --frozen-lockfile

      - name: TypeScript check landing
        working-directory: landing
        run: npx tsc --noEmit

      - name: Build landing and Vercel API bundle
        working-directory: landing
        run: pnpm build

  supabase:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v2
        with:
          version: latest

      - name: Verify Supabase CLI
        run: supabase --version

      - name: Verify Supabase config and migration files
        run: |
          test -f supabase/config.toml
          test -d supabase/migrations

      - name: Check migration filename uniqueness
        run: |
          duplicates=$(find supabase/migrations -maxdepth 1 -type f -name '*.sql' -printf '%f\n' | cut -d _ -f 1 | sort | uniq -d)
          if [ -n "$duplicates" ]; then
            echo "Duplicate migration timestamps found:"
            echo "$duplicates"
            exit 1
          fi

      - name: Document full local database check
        run: |
          echo "Full Supabase validation requires local Docker and is run with: pnpm db:check"
          echo "This CI job verifies Supabase CLI availability and migration/config structure only."
