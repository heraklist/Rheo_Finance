name: Capture Biome diagnostics

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  capture-biome-diagnostics:
    if: github.head_ref == 'dependabot/npm_and_yarn/biomejs/biome-2.4.16'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}
          token: ${{ github.token }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Setup pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.0.9 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Capture Biome diagnostics
        run: |
          pnpm exec biome check . > biome-diagnostics.full.txt 2>&1 || true
          tail -260 biome-diagnostics.full.txt > biome-diagnostics-tail.txt
          rm biome-diagnostics.full.txt

      - name: Remove temporary workflow
        run: rm .github/workflows/capture-biome-diagnostics.yml

      - name: Commit diagnostics
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add biome-diagnostics-tail.txt .github/workflows/capture-biome-diagnostics.yml
          git diff --cached --quiet && exit 0
          git commit -m "chore: capture remaining Biome diagnostics"
          git push
