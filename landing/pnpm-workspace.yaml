packages:
  - .

allowBuilds:
  esbuild: true
  sharp: true

# Keep these overrides local to the landing app to address Dependabot
# transitive dependency alerts without changing the main application stack.
overrides:
  minimatch: 10.2.3
  path-to-regexp: 8.4.0
  undici: 7.24.0
  ajv: 8.18.0
  smol-toml: 1.6.1
